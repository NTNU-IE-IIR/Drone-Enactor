syntax = "proto3";

package drone;

import "google/protobuf/empty.proto";

service DroneControl {
  rpc Enqueue(Command) returns (CommandAck);
  rpc StopNow(StopRequest) returns (StopReply);
  rpc GetStatus(google.protobuf.Empty) returns (StatusReply);
  rpc GetCommandStatus(CommandStatusRequest) returns (CommandStatusReply);
}

enum ExecState {
  DISCONNECTED = 0;
  IDLE = 1;
  ARMING = 2;
  TAKINGOFF = 3;
  HOVERING = 4;
  EXECUTINGCOMMAND = 5;
  LANDING = 6;
  EMERGENCYSTOPPED = 7;
  ERROR = 8;
}

enum CommandState {
  COMMAND_STATE_UNKNOWN = 0;
  COMMAND_STATE_QUEUED = 1;
  COMMAND_STATE_RUNNING = 2;
  COMMAND_STATE_SUCCEEDED = 3;
  COMMAND_STATE_FAILED = 4;
  COMMAND_STATE_INTERRUPTED = 5;
  COMMAND_STATE_CANCELLED = 6;
}

message Command {
  string id = 1;

  oneof payload {
    Hover hover = 10;
    FlyForward flyForward = 11;
    TurnYaw turnYaw = 12;
    Land land = 13;
  }
}

message Hover {
  double seconds = 1;
}

message FlyForward {
  double seconds = 1;
  double velocity = 2;
}

message TurnYaw {
  double deg = 1;
  double seconds = 2;
}

message Land {
  string message = 1;
}

message CommandAck {
  string id = 1;
  bool accepted = 2;
  string message = 3;
  ExecState state = 4;
  CommandState command_state = 5;
}

message StopRequest {}

message StopReply {
  bool ok = 1;
  string message = 2;
  ExecState state = 3;
}

message StatusReply {
  ExecState state = 1;
  string last_error = 2;
  bool connected = 3;
  bool armed = 4;
  bool in_air = 5;
  float relative_altitude_m = 6;
  int32 flight_mode = 7;
  uint32 queue_size = 8;
}

message CommandStatusRequest {
  string id = 1;
}

message CommandStatusReply {
  string id = 1;
  bool found = 2;
  CommandState command_state = 3;
  string message = 4;
  ExecState controller_state = 5;
}