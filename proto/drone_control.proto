syntax = "proto3";
package drone;

service DroneControl {
  rpc Enqueue(Command) returns (CommandAck);
  rpc StopNow(StopRequest) returns (StopReply);
}

message Command {
  string id = 1;
  oneof payload {
    Hover hover = 10;
    FlyForward flyForward = 11;
    Rotate rotate = 12;
    Land land = 13;
  }
}

message Hover { double seconds = 1; }
message FlyForward { double seconds = 1; double velocity = 2;}
message Rotate {double degrees = 1;}
message Land {string message = 1;}

message CommandAck { string id = 1; bool accepted = 2; string message = 3; }
message StopRequest {}
message StopReply { bool ok = 1; string message = 2; }
